<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 440" width="360" height="440" role="img" aria-label="Blueprint of the author">
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#1a1612" stroke-width="0.6"/>
    </pattern>
    <pattern id="hatchLight" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#1a1612" stroke-width="0.4" opacity="0.6"/>
    </pattern>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="6" height="6">
      <circle cx="2" cy="2" r="0.7" fill="#1a1612"/>
    </pattern>
  </defs>

  <!-- frame -->
  <rect x="0.5" y="0.5" width="359" height="439" fill="none" stroke="#1a1612" stroke-width="1"/>
  <rect x="8" y="8" width="344" height="424" fill="none" stroke="#1a1612" stroke-width="0.5" stroke-dasharray="2 3"/>

  <!-- title block -->
  <g font-family="Special Elite, Courier, monospace" fill="#1a1612">
    <text x="20" y="28" font-size="8" letter-spacing="2">PLATE I.</text>
    <text x="340" y="28" font-size="8" letter-spacing="2" text-anchor="end">FIG. 1</text>
    <text x="180" y="416" font-size="9" letter-spacing="3" text-anchor="middle">A BLUEPRINT OF THE AUTHOR, AGE XVII</text>
    <text x="180" y="427" font-size="6" letter-spacing="1.5" text-anchor="middle" fill="#5a4f3f">DRAWN FROM LIFE — SCALE 1:1 — BAGBAZAR, MMXXVI</text>
  </g>

  <!-- crosshair corners -->
  <g stroke="#1a1612" stroke-width="0.6" fill="none">
    <path d="M14 14 h8 M14 14 v8"/>
    <path d="M346 14 h-8 M346 14 v8"/>
    <path d="M14 426 h8 M14 426 v-8"/>
    <path d="M346 426 h-8 M346 426 v-8"/>
  </g>

  <!-- head -->
  <g fill="none" stroke="#1a1612" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- neck/shoulders -->
    <path d="M120 280 L120 320 L100 360 L260 360 L240 320 L240 280"/>
    <!-- collar/shoulders hatched -->
    <path d="M120 320 L100 360" stroke-width="0.6" stroke-dasharray="2 2"/>
    <path d="M240 320 L260 360" stroke-width="0.6" stroke-dasharray="2 2"/>
    <!-- shirt v -->
    <path d="M160 360 L180 320 L200 360"/>
    <path d="M180 320 L180 360" stroke-dasharray="1 2"/>

    <!-- head shape -->
    <ellipse cx="180" cy="170" rx="72" ry="86" fill="url(#hatchLight)"/>
    <ellipse cx="180" cy="170" rx="72" ry="86" fill="none"/>

    <!-- hair -->
    <path d="M115 145 Q120 90 180 80 Q240 90 245 145" fill="url(#hatch)"/>
    <path d="M115 145 Q120 90 180 80 Q240 90 245 145" fill="none"/>
    <path d="M120 140 Q150 110 180 110 Q210 110 240 140" fill="none"/>
    <!-- hair strands -->
    <path d="M140 100 Q145 130 150 145" stroke-width="0.5"/>
    <path d="M170 92 Q172 130 175 148" stroke-width="0.5"/>
    <path d="M200 95 Q200 130 198 148" stroke-width="0.5"/>
    <path d="M225 105 Q220 130 215 145" stroke-width="0.5"/>

    <!-- ears -->
    <path d="M108 175 Q102 180 108 200"/>
    <path d="M252 175 Q258 180 252 200"/>

    <!-- eyebrows -->
    <path d="M148 158 Q160 153 175 158" stroke-width="2.2"/>
    <path d="M205 158 Q220 153 232 158" stroke-width="2.2"/>

    <!-- eyes -->
    <ellipse cx="161" cy="172" rx="6" ry="3.5" fill="#1a1612"/>
    <ellipse cx="219" cy="172" rx="6" ry="3.5" fill="#1a1612"/>
    <circle cx="161" cy="171.5" r="1" fill="#f1e8d3"/>
    <circle cx="219" cy="171.5" r="1" fill="#f1e8d3"/>
    <!-- under eye -->
    <path d="M155 180 Q161 183 167 180" stroke-width="0.5"/>
    <path d="M213 180 Q219 183 225 180" stroke-width="0.5"/>

    <!-- nose -->
    <path d="M180 175 Q176 200 173 212 Q180 217 187 212 Q184 200 180 175"/>
    <path d="M180 175 Q176 200 173 212" stroke-width="0.8"/>
    <circle cx="175" cy="212" r="0.8" fill="#1a1612"/>
    <circle cx="185" cy="212" r="0.8" fill="#1a1612"/>

    <!-- mouth -->
    <path d="M165 232 Q180 240 195 232"/>
    <path d="M170 235 Q180 238 190 235" stroke-width="0.6"/>

    <!-- slight smile line -->
    <path d="M158 240 Q170 244 180 243" stroke-width="0.4" opacity="0.5"/>
    <path d="M180 243 Q190 244 202 240" stroke-width="0.4" opacity="0.5"/>

    <!-- chin shadow -->
    <path d="M150 250 Q180 270 210 250" stroke-width="0.5" opacity="0.4"/>

    <!-- glasses -->
    <circle cx="161" cy="172" r="14" fill="none" stroke-width="1.2"/>
    <circle cx="219" cy="172" r="14" fill="none" stroke-width="1.2"/>
    <line x1="175" y1="172" x2="205" y2="172" stroke-width="1.2"/>
    <line x1="147" y1="170" x2="138" y2="168" stroke-width="1.2"/>
    <line x1="233" y1="170" x2="242" y2="168" stroke-width="1.2"/>
  </g>

  <!-- callout lines and labels -->
  <g stroke="#a8321e" stroke-width="0.8" fill="none">
    <line x1="180" y1="86" x2="180" y2="55"/>
    <line x1="180" y1="55" x2="295" y2="55"/>
  </g>
  <g font-family="Special Elite, Courier, monospace" fill="#1a1612">
    <text x="300" y="52" font-size="9" letter-spacing="1.5">A</text>
    <text x="300" y="64" font-size="6.5" letter-spacing="1">RECEIVES IDEAS</text>
    <text x="300" y="73" font-size="6.5" letter-spacing="1">SINCE 2009</text>
  </g>

  <g stroke="#a8321e" stroke-width="0.8" fill="none">
    <line x1="147" y1="172" x2="60" y2="172"/>
    <line x1="60" y1="172" x2="55" y2="158"/>
  </g>
  <g font-family="Special Elite, Courier, monospace" fill="#1a1612">
    <text x="20" y="150" font-size="9" letter-spacing="1.5">B</text>
    <text x="20" y="162" font-size="6.5" letter-spacing="1">READS DOCS</text>
    <text x="20" y="171" font-size="6.5" letter-spacing="1">AT SPEED</text>
  </g>

  <g stroke="#a8321e" stroke-width="0.8" fill="none">
    <line x1="180" y1="232" x2="180" y2="305"/>
    <line x1="180" y1="305" x2="60" y2="305"/>
  </g>
  <g font-family="Special Elite, Courier, monospace" fill="#1a1612">
    <text x="20" y="298" font-size="9" letter-spacing="1.5">C</text>
    <text x="20" y="310" font-size="6.5" letter-spacing="1">SPEAKS AT</text>
    <text x="20" y="319" font-size="6.5" letter-spacing="1">HACKATHONS</text>
  </g>

  <g stroke="#a8321e" stroke-width="0.8" fill="none">
    <line x1="120" y1="360" x2="120" y2="395"/>
    <line x1="120" y1="395" x2="55" y2="395"/>
  </g>
  <g font-family="Special Elite, Courier, monospace" fill="#1a1612">
    <text x="20" y="388" font-size="9" letter-spacing="1.5">D</text>
    <text x="20" y="400" font-size="6.5" letter-spacing="1">WRITE THE</text>
    <text x="20" y="409" font-size="6.5" letter-spacing="1">CODE</text>
  </g>

  <g stroke="#a8321e" stroke-width="0.8" fill="none">
    <line x1="240" y1="360" x2="240" y2="395"/>
    <line x1="240" y1="395" x2="305" y2="395"/>
  </g>
  <g font-family="Special Elite, Courier, monospace" fill="#1a1612">
    <text x="310" y="388" font-size="9" letter-spacing="1.5">E</text>
    <text x="310" y="400" font-size="6.5" letter-spacing="1">WALK TO</text>
    <text x="310" y="409" font-size="6.5" letter-spacing="1">SCHOOL</text>
  </g>

  <g stroke="#a8321e" stroke-width="0.8" fill="none">
    <line x1="180" y1="332" x2="305" y2="332"/>
  </g>
  <g font-family="Special Elite, Courier, monospace" fill="#1a1612">
    <text x="310" y="328" font-size="9" letter-spacing="1.5">F</text>
    <text x="310" y="340" font-size="6.5" letter-spacing="1">BEATS FOR</text>
    <text x="310" y="349" font-size="6.5" letter-spacing="1">KATHMANDU</text>
  </g>

  <!-- stamp -->
  <g transform="translate(20 30) rotate(-6)">
    <rect x="0" y="0" width="60" height="22" fill="none" stroke="#a8321e" stroke-width="1" opacity="0.7"/>
    <text x="30" y="14" text-anchor="middle" font-family="Special Elite, Courier, monospace" font-size="8" letter-spacing="2" fill="#a8321e" opacity="0.85">SELF-DRAWN</text>
  </g>

  <!-- measurement guide -->
  <g stroke="#5a4f3f" stroke-width="0.4" fill="#5a4f3f" font-family="Special Elite, Courier, monospace" font-size="6">
    <line x1="100" y1="86" x2="100" y2="60" stroke-dasharray="2 2"/>
    <line x1="260" y1="86" x2="260" y2="60" stroke-dasharray="2 2"/>
    <line x1="100" y1="60" x2="260" y2="60" stroke-dasharray="2 2"/>
    <text x="180" y="48" text-anchor="middle" letter-spacing="1.5">CROWN TO EYES · 86 UNITS</text>
  </g>
</svg>
