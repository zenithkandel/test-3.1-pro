<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" width="360" height="280" role="img" aria-label="Sastomahango: price index diagram">
  <defs>
    <pattern id="hatch1" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#1a1612" stroke-width="0.6"/>
    </pattern>
    <pattern id="dots1" patternUnits="userSpaceOnUse" width="6" height="6">
      <circle cx="2" cy="2" r="0.7" fill="#1a1612"/>
    </pattern>
  </defs>

  <rect x="0.5" y="0.5" width="359" height="279" fill="none" stroke="#1a1612" stroke-width="1"/>
  <rect x="8" y="8" width="344" height="264" fill="none" stroke="#1a1612" stroke-width="0.5" stroke-dasharray="2 3"/>

  <g font-family="Special Elite, Courier, monospace" fill="#1a1612">
    <text x="20" y="28" font-size="8" letter-spacing="2">PLATE II.</text>
    <text x="340" y="28" font-size="8" letter-spacing="2" text-anchor="end">FIG. 1</text>
    <text x="180" y="260" font-size="8" letter-spacing="2" text-anchor="middle">SASTOMAHANGO — CROWD-SOURCED PRICE INDEX</text>
  </g>

  <!-- bar chart base -->
  <g fill="none" stroke="#1a1612" stroke-linecap="round" stroke-linejoin="round">
    <line x1="40" y1="220" x2="320" y2="220" stroke-width="1.4"/>
    <line x1="40" y1="220" x2="40" y2="60" stroke-width="1.4"/>
    <line x1="40" y1="60" x2="36" y2="60" stroke-width="1.2"/>
    <line x1="40" y1="100" x2="36" y2="100" stroke-width="1.2"/>
    <line x1="40" y1="140" x2="36" y2="140" stroke-width="1.2"/>
    <line x1="40" y1="180" x2="36" y2="180" stroke-width="1.2"/>

    <line x1="40" y1="220" x2="44" y2="220" stroke-width="1"/>
    <line x1="80" y1="220" x2="84" y2="220" stroke-width="1"/>
    <line x1="120" y1="220" x2="124" y2="220" stroke-width="1"/>
    <line x1="160" y1="220" x2="164" y2="220" stroke-width="1"/>
    <line x1="200" y1="220" x2="204" y2="220" stroke-width="1"/>
    <line x1="240" y1="220" x2="244" y2="220" stroke-width="1"/>
    <line x1="280" y1="220" x2="284" y2="220" stroke-width="1"/>
    <line x1="320" y1="220" x2="324" y2="220" stroke-width="1"/>
  </g>

  <!-- bars -->
  <g stroke="#1a1612" stroke-width="1.2" stroke-linejoin="round">
    <rect x="55" y="140" width="40" height="80" fill="url(#hatch1)"/>
    <rect x="115" y="100" width="40" height="120" fill="url(#hatch1)"/>
    <rect x="175" y="160" width="40" height="60" fill="url(#hatch1)"/>
    <rect x="235" y="80" width="40" height="140" fill="url(#hatch1)"/>
  </g>

  <!-- y-axis labels -->
  <g font-family="Special Elite, Courier, monospace" font-size="6" fill="#5a4f3f" text-anchor="end">
    <text x="32" y="63">₨ 200</text>
    <text x="32" y="103">₨ 150</text>
    <text x="32" y="143">₨ 100</text>
    <text x="32" y="183">₨ 50</text>
    <text x="32" y="223">₨ 0</text>
  </g>

  <!-- x-axis labels (commodities) -->
  <g font-family="Special Elite, Courier, monospace" font-size="6" fill="#5a4f3f" text-anchor="middle">
    <text x="75" y="234">RICE</text>
    <text x="135" y="234">OIL</text>
    <text x="195" y="234">ONION</text>
    <text x="255" y="234">SUGAR</text>
  </g>

  <!-- price tag overlays -->
  <g font-family="Special Elite, Courier, monospace" fill="#1a1612" stroke="#1a1612" stroke-width="1" stroke-linejoin="round">
    <!-- tag 1 -->
    <g transform="translate(50 80) rotate(-8)">
      <path d="M0 0 L40 0 L52 12 L40 24 L0 24 Z" fill="#f1e8d3"/>
      <circle cx="44" cy="12" r="1.5" fill="#1a1612"/>
      <text x="8" y="16" font-size="7" letter-spacing="0.5">₨95</text>
    </g>
    <!-- tag 2 -->
    <g transform="translate(220 50) rotate(5)">
      <path d="M0 0 L40 0 L52 12 L40 24 L0 24 Z" fill="#f1e8d3"/>
      <circle cx="44" cy="12" r="1.5" fill="#1a1612"/>
      <text x="6" y="16" font-size="7" letter-spacing="0.5">₨180</text>
    </g>
    <!-- tag 3 -->
    <g transform="translate(160 110) rotate(-3)">
      <path d="M0 0 L36 0 L48 12 L36 24 L0 24 Z" fill="#f1e8d3"/>
      <circle cx="40" cy="12" r="1.5" fill="#1a1612"/>
      <text x="6" y="16" font-size="6" letter-spacing="0.5">₨70</text>
    </g>
  </g>

  <!-- strings from tags to bars -->
  <g stroke="#a8321e" stroke-width="0.6" fill="none" stroke-dasharray="2 2" opacity="0.6">
    <line x1="92" y1="92" x2="75" y2="140"/>
    <line x1="262" y1="62" x2="255" y2="80"/>
    <line x1="192" y1="122" x2="195" y2="160"/>
  </g>

  <!-- callout A -->
  <g stroke="#a8321e" stroke-width="0.7" fill="none">
    <line x1="75" y1="140" x2="75" y2="120"/>
    <line x1="75" y1="120" x2="55" y2="110"/>
  </g>
  <text x="20" y="105" font-family="Special Elite, Courier, monospace" font-size="6.5" letter-spacing="1" fill="#1a1612">A — SUBMITTED PRICE</text>

  <!-- callout B -->
  <g stroke="#a8321e" stroke-width="0.7" fill="none">
    <line x1="255" y1="80" x2="295" y2="60"/>
  </g>
  <text x="300" y="55" font-family="Special Elite, Courier, monospace" font-size="6.5" letter-spacing="1" fill="#1a1612">B — MARKET PRICE</text>

  <!-- stamp -->
  <g transform="translate(250 230) rotate(-4)">
    <rect x="0" y="0" width="78" height="20" fill="none" stroke="#a8321e" stroke-width="0.9" opacity="0.75"/>
    <text x="39" y="13" text-anchor="middle" font-family="Special Elite, Courier, monospace" font-size="7" letter-spacing="2" fill="#a8321e" opacity="0.85">VERIFIED · MMXXIV</text>
  </g>

  <!-- legend -->
  <g font-family="Special Elite, Courier, monospace" font-size="6" fill="#5a4f3f">
    <rect x="40" y="50" width="6" height="6" fill="url(#hatch1)" stroke="#1a1612" stroke-width="0.6"/>
    <text x="50" y="56">RANGE OF SUBMITTED PRICES, 30-DAY WINDOW</text>
  </g>
</svg>
