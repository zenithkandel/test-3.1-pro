<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Corner registration marks -->
    <path d="M10 10 L10 22 M10 10 L22 10" stroke="#bc7155" stroke-width="1.5" stroke-linecap="square"/>
    <path d="M190 10 L190 22 M190 10 L178 10" stroke="#bc7155" stroke-width="1.5" stroke-linecap="square"/>
    <path d="M10 190 L10 178 M10 190 L22 190" stroke="#bc7155" stroke-width="1.5" stroke-linecap="square"/>
    <path d="M190 190 L190 178 M190 190 L178 190" stroke="#bc7155" stroke-width="1.5" stroke-linecap="square"/>

    <!-- Reader box (top) -->
    <g transform="translate(100, 80)">
        <!-- box body -->
        <rect x="-50" y="-30" width="100" height="60" rx="6" fill="#ffffff" stroke="#bc7155" stroke-width="2"/>
        <!-- display screen -->
        <rect x="-40" y="-22" width="80" height="34" rx="3" fill="none" stroke="#bc7155" stroke-width="1" opacity="0.5"/>
        <!-- check mark on display -->
        <path d="M-12 0 L-4 8 L12 -10" stroke="#bc7155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <!-- LED row below screen -->
        <circle cx="-30" cy="20" r="2" fill="#bc7155"/>
        <circle cx="-22" cy="20" r="2" fill="none" stroke="#bc7155" stroke-width="1" opacity="0.5"/>
        <circle cx="-14" cy="20" r="2" fill="none" stroke="#bc7155" stroke-width="1" opacity="0.5"/>
        <!-- speaker grille -->
        <line x1="20" y1="18" x2="40" y2="18" stroke="#bc7155" stroke-width="1" opacity="0.5"/>
        <line x1="20" y1="22" x2="40" y2="22" stroke="#bc7155" stroke-width="1" opacity="0.5"/>
        <!-- tap zone (bottom of box) -->
        <line x1="-40" y1="30" x2="40" y2="30" stroke="#bc7155" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
    </g>

    <!-- RFID Card (bottom, tilted, tapping reader) -->
    <g transform="translate(100, 150) rotate(-8)">
        <!-- card body -->
        <rect x="-44" y="-22" width="88" height="44" rx="5" fill="#ffffff" stroke="#bc7155" stroke-width="2"/>
        <!-- inner border -->
        <rect x="-40" y="-18" width="80" height="36" rx="3" fill="none" stroke="#bc7155" stroke-width="1" opacity="0.4"/>
        <!-- photo placeholder -->
        <rect x="-34" y="-12" width="20" height="20" rx="2" fill="none" stroke="#bc7155" stroke-width="1.2"/>
        <!-- person silhouette in photo -->
        <circle cx="-24" cy="-6" r="3" fill="#bc7155"/>
        <path d="M-31 4 Q-31 -2 -24 -2 Q-17 -2 -17 4 Z" fill="#bc7155"/>
        <!-- text lines -->
        <line x1="-8" y1="-10" x2="32" y2="-10" stroke="#bc7155" stroke-width="1.4"/>
        <line x1="-8" y1="-4" x2="22" y2="-4" stroke="#bc7155" stroke-width="1" opacity="0.5"/>
        <line x1="-8" y1="2" x2="28" y2="2" stroke="#bc7155" stroke-width="1" opacity="0.5"/>
        <!-- ID / name -->
        <text x="12" y="-1" text-anchor="middle" font-family="Inter, sans-serif" font-size="6" font-weight="800" fill="#bc7155" letter-spacing="1">STUDENT</text>
        <!-- RFID chip on card (right side) -->
        <g transform="translate(28, 12)">
            <rect x="-6" y="-5" width="12" height="10" rx="1" fill="#bc7155" stroke="#bc7155" stroke-width="1"/>
            <line x1="-3" y1="-5" x2="-3" y2="5" stroke="#ffffff" stroke-width="0.6"/>
            <line x1="0" y1="-5" x2="0" y2="5" stroke="#ffffff" stroke-width="0.6"/>
            <line x1="3" y1="-5" x2="3" y2="5" stroke="#ffffff" stroke-width="0.6"/>
            <line x1="-6" y1="-2" x2="6" y2="-2" stroke="#ffffff" stroke-width="0.6"/>
            <line x1="-6" y1="2" x2="6" y2="2" stroke="#ffffff" stroke-width="0.6"/>
        </g>
    </g>

    <!-- Signal waves between card and reader -->
    <g transform="translate(100, 122)">
        <path d="M-26 0 Q-26 -8 -18 -8" stroke="#bc7155" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        <path d="M-26 0 Q-26 8 -18 8" stroke="#bc7155" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        <path d="M-12 -4 Q0 -10 12 -4" stroke="#bc7155" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        <path d="M-12 4 Q0 10 12 4" stroke="#bc7155" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        <path d="M26 0 Q26 -8 18 -8" stroke="#bc7155" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        <path d="M26 0 Q26 8 18 8" stroke="#bc7155" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    </g>

    <!-- "TAP" arrow indicator -->
    <g transform="translate(168, 124)">
        <line x1="-4" y1="0" x2="4" y2="0" stroke="#bc7155" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M1 -3 L5 0 L1 3" stroke="#bc7155" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
</svg>
