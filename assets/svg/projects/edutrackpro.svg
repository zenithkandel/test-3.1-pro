<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Sienna Gradient for primary elements -->
        <linearGradient id="sienna-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#bc7155" />
            <stop offset="50%" stop-color="#d98f72" />
            <stop offset="100%" stop-color="#914d33" />
        </linearGradient>
        <!-- Soft Radial Glow Background -->
        <radialGradient id="glow-bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#bc7155" stop-opacity="0.14" />
            <stop offset="100%" stop-color="#bc7155" stop-opacity="0" />
        </radialGradient>
    </defs>

    <!-- Corner registration marks -->
    <g stroke="#bc7155" stroke-width="1" opacity="0.3">
        <path d="M12 12 L12 22 M12 12 L22 12"/>
        <path d="M188 12 L188 22 M188 12 L178 12"/>
        <path d="M12 188 L12 178 M12 188 L22 188"/>
        <path d="M188 188 L188 178 M188 188 L178 188"/>
    </g>

    <!-- Background Glow -->
    <circle cx="100" cy="100" r="80" fill="url(#glow-bg)" />

    <!-- 1. Background Scanner Terminal (Isometric) -->
    <g transform="translate(90, 120) rotate(-30) skewX(30)">
        <!-- Scanner Pad -->
        <rect x="-45" y="-35" width="90" height="70" rx="6" fill="#000d10" stroke="url(#sienna-gradient)" stroke-width="1.2" />
        
        <!-- Scanner Inner Screen / Target area -->
        <rect x="-35" y="-25" width="70" height="50" rx="4" fill="none" stroke="#bc7155" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.3" />
        
        <!-- Concentric scanning rings -->
        <ellipse cx="0" cy="0" rx="20" ry="12" stroke="#bc7155" stroke-width="0.8" opacity="0.2" fill="none" />
        <ellipse cx="0" cy="0" rx="10" ry="6" stroke="#bc7155" stroke-width="1" opacity="0.4" fill="none" />
        
        <!-- Status LEDs -->
        <circle cx="-38" cy="28" r="1.5" fill="#bc7155" />
        <circle cx="-32" cy="28" r="1.5" fill="#bc7155" opacity="0.4" />
    </g>

    <!-- 2. Floating NFC Smart Card (Shifted up relative to reader (105, 80)) -->
    <g transform="translate(108, 80) rotate(-30) skewX(30)">
        <!-- Card shadow on terminal -->
        <!-- Placed relative to terminal coords, but inside this transform we can just draw flat graphics -->
        <rect x="-35" y="-22" width="70" height="44" rx="4" fill="#000d10" stroke="url(#sienna-gradient)" stroke-width="1.8" />
        
        <!-- Smart Chip (Contact plate) -->
        <g stroke="#bc7155" stroke-width="0.8" fill="none">
            <rect x="-26" y="-12" width="12" height="9" rx="1" stroke-width="1" />
            <!-- Chip grid -->
            <line x1="-20" y1="-12" x2="-20" y2="-3" />
            <line x1="-26" y1="-7.5" x2="-14" y2="-7.5" />
        </g>

        <!-- User Information placeholder lines -->
        <g stroke="url(#sienna-gradient)" stroke-linecap="round">
            <line x1="-8" y1="-10" x2="24" y2="-10" stroke-width="1.2" opacity="0.7" />
            <line x1="-8" y1="-5" x2="16" y2="-5" stroke-width="0.8" opacity="0.4" />
            
            <!-- Barcode strip -->
            <line x1="-26" y1="8" x2="24" y2="8" stroke-width="1" stroke-dasharray="2 3" opacity="0.3" />
        </g>

        <!-- Profile Photo Frame -->
        <circle cx="20" cy="-6" r="4.5" fill="none" stroke="#bc7155" stroke-width="0.8" opacity="0.5" />
    </g>

    <!-- 3. NFC Wireless Transmission Waves (2D curves for clean representation) -->
    <g stroke="url(#sienna-gradient)" stroke-linecap="round" fill="none">
        <!-- Wave 1 (Inner) -->
        <path d="M 68 86 A 25 25 0 0 1 115 62" stroke-width="1.8" />
        <!-- Wave 2 (Middle) -->
        <path d="M 60 78 A 36 36 0 0 1 125 48" stroke-width="1.2" opacity="0.6" />
        <!-- Wave 3 (Outer) -->
        <path d="M 52 71 A 47 47 0 0 1 135 34" stroke-width="0.8" opacity="0.3" />
    </g>
</svg>
