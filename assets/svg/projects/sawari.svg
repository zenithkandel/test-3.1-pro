<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Sienna Gradient for primary elements -->
        <linearGradient id="sienna-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#bc7155" />
            <stop offset="50%" stop-color="#d98f72" />
            <stop offset="100%" stop-color="#914d33" />
        </linearGradient>
        <!-- Soft Radial Glow Background -->
        <radialGradient id="glow-bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#bc7155" stop-opacity="0.14" />
            <stop offset="100%" stop-color="#bc7155" stop-opacity="0" />
        </radialGradient>
    </defs>

    <!-- Corner registration marks -->
    <g stroke="#bc7155" stroke-width="1" opacity="0.3">
        <path d="M12 12 L12 22 M12 12 L22 12"/>
        <path d="M188 12 L188 22 M188 12 L178 12"/>
        <path d="M12 188 L12 178 M12 188 L22 188"/>
        <path d="M188 188 L188 178 M188 188 L178 188"/>
    </g>

    <!-- Background Glow -->
    <circle cx="100" cy="100" r="80" fill="url(#glow-bg)" />

    <!-- 1. Isometric Map Platform -->
    <g transform="translate(90, 115) rotate(-30) skewX(30)">
        <!-- Map Card Base -->
        <rect x="-55" y="-35" width="110" height="70" rx="5" fill="#000d10" stroke="url(#sienna-gradient)" stroke-width="1.5" />
        
        <!-- Isometric Street Grid Lines -->
        <g stroke="#bc7155" stroke-width="0.5" opacity="0.12">
            <line x1="-35" y1="-35" x2="-35" y2="35" />
            <line x1="-15" y1="-35" x2="-15" y2="35" />
            <line x1="5" y1="-35" x2="5" y2="35" />
            <line x1="25" y1="-35" x2="25" y2="35" />
            <line x1="45" y1="-35" x2="45" y2="35" />
            <line x1="-55" y1="-15" x2="55" y2="-15" />
            <line x1="-55" y1="5" x2="55" y2="5" />
            <line x1="-55" y1="25" x2="55" y2="25" />
        </g>

        <!-- Route Path (Elegant Curved S-curve on the grid) -->
        <path d="M -35 15 Q -10 -15 0 10 T 35 -15" stroke="url(#sienna-gradient)" stroke-width="2.2" stroke-linecap="round" fill="none" />
        <!-- Secondary dash path for active motion -->
        <path d="M -35 15 Q -10 -15 0 10 T 35 -15" stroke="#ffffff" stroke-width="1" stroke-linecap="round" stroke-dasharray="2 4" fill="none" opacity="0.6" />

        <!-- Origin Node (Point A) -->
        <circle cx="-35" cy="15" r="3" fill="#bc7155" />
        <circle cx="-35" cy="15" r="6" stroke="#bc7155" stroke-width="0.6" opacity="0.5" />

        <!-- Route Shadow below Destination Pin -->
        <ellipse cx="35" cy="-15" rx="5.5" ry="2" fill="#000d10" opacity="0.6" />
        <ellipse cx="35" cy="-15" rx="4" ry="1.5" fill="#bc7155" opacity="0.3" />

        <!-- Route active tracker (GPS Dot) -->
        <circle cx="0" cy="10" r="3" fill="#bc7155" />
        <circle cx="0" cy="10" r="7" stroke="#bc7155" stroke-width="0.8" stroke-dasharray="1.5 2" opacity="0.7" />
    </g>

    <!-- 2. Floating 3D Map Pin (Shifted up relative to grid (35, -15)) -->
    <!-- Grid space coordinate projected roughly is: X ~ 138, Y ~ 90 -->
    <g transform="translate(138, 75)">
        <!-- Pin Body -->
        <path d="M 0 -13 C -5 -13 -8 -9 -8 -5 C -8 0 0 9 0 9 C 0 9 8 0 8 -5 C 8 -9 5 -13 0 -13 Z" fill="url(#sienna-gradient)" stroke="#bc7155" stroke-width="0.5" stroke-linejoin="round" />
        <!-- Pin Core -->
        <circle cx="0" cy="-5" r="2.5" fill="#000d10" stroke="#bc7155" stroke-width="0.5" />
    </g>

    <!-- 3. Floating ETA Badge (2D overlay in front) -->
    <g transform="translate(42, 60)">
        <!-- Connecting indicator line to the map -->
        <path d="M 28 8 C 45 8 50 15 65 24" stroke="#bc7155" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.4" fill="none" />
        
        <!-- Badge Box -->
        <rect x="-18" y="-10" width="36" height="18" rx="3" fill="#000d10" stroke="url(#sienna-gradient)" stroke-width="1.2" />
        <!-- Mini clock icon inside -->
        <circle cx="-10" cy="-1" r="3" stroke="#bc7155" stroke-width="0.8" />
        <path d="M -10 -1 L -10 1 L -8 1" stroke="#bc7155" stroke-width="0.8" stroke-linecap="round" />
        <!-- Text 5 MIN -->
        <text x="7" y="2" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="900" fill="url(#sienna-gradient)">5m</text>
    </g>
</svg>
