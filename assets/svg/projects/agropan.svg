<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#bc7155" stroke-width="1" opacity="0.3">
        <path d="M12 12 L12 22 M12 12 L22 12"/>
        <path d="M188 12 L188 22 M188 12 L178 12"/>
        <path d="M12 188 L12 178 M12 188 L22 188"/>
        <path d="M188 188 L188 178 M188 188 L178 188"/>
    </g>

    <!-- Clean Geometric Leaf Outline -->
    <path d="M 100 40 C 50 70 60 130 100 160 C 140 130 150 70 100 40 Z" fill="#bc7155" fill-opacity="0.05" stroke="#bc7155" stroke-width="2" stroke-linejoin="round"/>
    
    <!-- Central Digital Stem -->
    <line x1="100" y1="40" x2="100" y2="160" stroke="#bc7155" stroke-width="1.5"/>
    
    <!-- Digital Branches (Circuit style) -->
    <polyline points="100 80 80 100 70 100" fill="none" stroke="#bc7155" stroke-width="1.5"/>
    <circle cx="70" cy="100" r="3" fill="#bc7155"/>
    
    <polyline points="100 110 120 90 130 90" fill="none" stroke="#bc7155" stroke-width="1.5"/>
    <circle cx="130" cy="90" r="3" fill="#bc7155"/>
    
    <!-- Droplet / Node at Bottom -->
    <circle cx="100" cy="160" r="4" fill="#bc7155"/>
    <circle cx="100" cy="160" r="10" fill="none" stroke="#bc7155" stroke-width="1" opacity="0.4"/>
</svg>
