<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Sienna Gradient for primary elements -->
        <linearGradient id="sienna-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#bc7155" />
            <stop offset="50%" stop-color="#d98f72" />
            <stop offset="100%" stop-color="#914d33" />
        </linearGradient>
        <!-- Soft Radial Glow Background -->
        <radialGradient id="glow-bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#bc7155" stop-opacity="0.14" />
            <stop offset="100%" stop-color="#bc7155" stop-opacity="0" />
        </radialGradient>
    </defs>

    <!-- Corner registration marks -->
    <g stroke="#bc7155" stroke-width="1" opacity="0.3">
        <path d="M12 12 L12 22 M12 12 L22 12"/>
        <path d="M188 12 L188 22 M188 12 L178 12"/>
        <path d="M12 188 L12 178 M12 188 L22 188"/>
        <path d="M188 188 L188 178 M188 188 L178 188"/>
    </g>

    <!-- Background Glow -->
    <circle cx="100" cy="100" r="80" fill="url(#glow-bg)" />

    <!-- Technical Sensor Waves (Background) -->
    <g stroke="url(#sienna-gradient)" stroke-width="0.6" opacity="0.15" fill="none">
        <circle cx="100" cy="95" r="70" stroke-dasharray="3 6" />
        <circle cx="100" cy="95" r="54" stroke-dasharray="6 6" />
    </g>

    <!-- Primary Leaf Illustration -->
    <!-- Symmetric, elegant Bezier leaf outline -->
    <path d="M 100 40 C 60 65 60 115 100 140 C 140 115 140 65 100 40 Z" fill="url(#sienna-gradient)" fill-opacity="0.06" stroke="url(#sienna-gradient)" stroke-width="1.8" stroke-linejoin="round" />
    
    <!-- Inner Leaf Accent Border -->
    <path d="M 100 48 C 66 70 66 110 100 132 C 134 110 134 70 100 48 Z" stroke="url(#sienna-gradient)" stroke-width="0.8" opacity="0.25" fill="none" />

    <!-- Tech Circuit Veins (Integrating Nature and Data) -->
    <g stroke="url(#sienna-gradient)" stroke-linecap="round" fill="none">
        <!-- Main Stem -->
        <line x1="100" y1="40" x2="100" y2="152" stroke-width="1.8" />
        
        <!-- Vein Set 1 (Top) -->
        <path d="M 100 65 L 86 79 L 78 79" stroke-width="1" opacity="0.7" />
        <path d="M 100 65 L 114 79 L 122 79" stroke-width="1" opacity="0.7" />
        
        <!-- Vein Set 2 (Middle, with circuit nodes) -->
        <path d="M 100 90 L 80 110 L 70 110" stroke-width="1.2" />
        <path d="M 100 90 L 120 110 L 130 110" stroke-width="1.2" />
        
        <!-- Vein Set 3 (Bottom, with circuit nodes) -->
        <path d="M 100 115 L 85 130 L 80 130" stroke-width="1" opacity="0.6" />
        <path d="M 100 115 L 115 130 L 120 130" stroke-width="1" opacity="0.6" />
    </g>

    <!-- Circuit Nodes (Terminal dots) -->
    <g fill="#bc7155">
        <circle cx="70" cy="110" r="2.5" />
        <circle cx="130" cy="110" r="2.5" />
        <circle cx="78" cy="79" r="1.5" opacity="0.7" />
        <circle cx="122" cy="79" r="1.5" opacity="0.7" />
        <circle cx="80" cy="130" r="1.5" opacity="0.6" />
        <circle cx="120" cy="130" r="1.5" opacity="0.6" />
    </g>

    <!-- Suspended Water Droplet (Falling from stem) -->
    <g transform="translate(100, 162)">
        <path d="M 0 -10 C -4 -5 -6 -1 -6 3 A 6 6 0 0 0 6 3 C 6 -1 4 -5 0 -10 Z" fill="url(#sienna-gradient)" fill-opacity="0.3" stroke="url(#sienna-gradient)" stroke-width="1.2" stroke-linejoin="round" />
        <!-- Glint -->
        <circle cx="-2" cy="2" r="1" fill="#ffffff" opacity="0.6" />
    </g>
</svg>
