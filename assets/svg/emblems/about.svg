<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Corner registration marks -->
    <g stroke="#bc7155" stroke-width="1" opacity="0.3">
        <path d="M12 12 L12 22 M12 12 L22 12"/>
        <path d="M188 12 L188 22 M188 12 L178 12"/>
        <path d="M12 188 L12 178 M12 188 L22 188"/>
        <path d="M188 188 L188 178 M188 188 L178 188"/>
    </g>
    <!-- Minimalist Compass / Core -->
    <!-- Crosshairs -->
    <line x1="100" y1="20" x2="100" y2="180" stroke="#bc7155" stroke-width="0.8" opacity="0.4" stroke-dasharray="4 6"/>
    <line x1="20" y1="100" x2="180" y2="100" stroke="#bc7155" stroke-width="0.8" opacity="0.4" stroke-dasharray="4 6"/>
    
    <!-- Concentric Rings -->
    <circle cx="100" cy="100" r="60" stroke="#bc7155" stroke-width="1" opacity="0.2"/>
    <circle cx="100" cy="100" r="45" stroke="#bc7155" stroke-width="1.5" opacity="0.4" stroke-dasharray="10 4"/>
    
    <!-- Core Diamond Shape -->
    <path d="M100 75 L125 100 L100 125 L75 100 Z" fill="none" stroke="#bc7155" stroke-width="2"/>
    <path d="M100 85 L115 100 L100 115 L85 100 Z" fill="#bc7155" opacity="0.1"/>
    
    <!-- Center Dot -->
    <circle cx="100" cy="100" r="4" fill="#bc7155"/>
    
    <!-- Outer Accent Nodes -->
    <circle cx="100" cy="40" r="3" fill="#bc7155" opacity="0.8"/>
    <circle cx="100" cy="160" r="3" fill="#bc7155" opacity="0.8"/>
    <circle cx="40" cy="100" r="3" fill="#bc7155" opacity="0.8"/>
    <circle cx="160" cy="100" r="3" fill="#bc7155" opacity="0.8"/>
</svg>
