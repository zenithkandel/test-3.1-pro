<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Sienna Gradient for primary elements -->
        <linearGradient id="sienna-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#bc7155" />
            <stop offset="50%" stop-color="#d98f72" />
            <stop offset="100%" stop-color="#914d33" />
        </linearGradient>
        <!-- Soft Radial Glow Background -->
        <radialGradient id="glow-bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#bc7155" stop-opacity="0.15" />
            <stop offset="100%" stop-color="#bc7155" stop-opacity="0" />
        </radialGradient>
    </defs>

    <!-- Corner registration marks -->
    <g stroke="#bc7155" stroke-width="1" opacity="0.3">
        <path d="M12 12 L12 22 M12 12 L22 12"/>
        <path d="M188 12 L188 22 M188 12 L178 12"/>
        <path d="M12 188 L12 178 M12 188 L22 188"/>
        <path d="M188 188 L188 178 M188 188 L178 188"/>
    </g>

    <!-- Background Glow -->
    <circle cx="100" cy="100" r="80" fill="url(#glow-bg)" />

    <!-- Isometric Tech Grid Backing -->
    <g stroke="#bc7155" stroke-width="0.5" opacity="0.08">
        <!-- Diagonal Lines -->
        <line x1="20" y1="60" x2="140" y2="180" />
        <line x1="60" y1="20" x2="180" y2="140" />
        <line x1="20" y1="140" x2="140" y2="20" />
        <line x1="60" y1="180" x2="180" y2="60" />
        <!-- Concentric circles -->
        <circle cx="100" cy="100" r="70" stroke-dasharray="2 4" />
        <circle cx="100" cy="100" r="50" stroke-dasharray="1 5" />
    </g>

    <!-- Window 1: Background Code Window (Offset & Translucent) -->
    <g transform="translate(85, 115) rotate(-30) skewX(30)">
        <!-- Window Box -->
        <rect x="-55" y="-35" width="110" height="70" rx="6" fill="#000d10" stroke="url(#sienna-gradient)" stroke-width="1.2" opacity="0.4" />
        <!-- Separator -->
        <line x1="-55" y1="-18" x2="55" y2="-18" stroke="#bc7155" stroke-width="0.8" opacity="0.2" />
        <!-- Code line placeholders -->
        <rect x="-45" y="-8" width="30" height="3" rx="1.5" fill="#bc7155" opacity="0.2" />
        <rect x="-45" y="2" width="50" height="3" rx="1.5" fill="#bc7155" opacity="0.25" />
        <rect x="-45" y="12" width="40" height="3" rx="1.5" fill="#bc7155" opacity="0.2" />
    </g>

    <!-- Window 2: Foreground Code Window (Sharp & detailed) -->
    <g transform="translate(110, 88) rotate(-30) skewX(30)">
        <!-- 3D extrusion effect underneath -->
        <path d="M-55 35 L-55 39 L55 39 L55 35 Z" fill="#753c23" opacity="0.8" />
        <path d="M55 -35 L59 -35 L59 35 L55 35 Z" fill="#914d33" opacity="0.8" />

        <!-- Window Card -->
        <rect x="-55" y="-35" width="110" height="70" rx="5" fill="#000d10" stroke="url(#sienna-gradient)" stroke-width="1.8" />
        
        <!-- Header Bar -->
        <line x1="-55" y1="-17" x2="55" y2="-17" stroke="url(#sienna-gradient)" stroke-width="1" opacity="0.4" />
        
        <!-- Window Controls (Three Dots) -->
        <circle cx="-45" cy="-26" r="2.5" fill="url(#sienna-gradient)" />
        <circle cx="-37" cy="-26" r="2.5" fill="url(#sienna-gradient)" opacity="0.6" />
        <circle cx="-29" cy="-26" r="2.5" fill="url(#sienna-gradient)" opacity="0.3" />
        
        <!-- Mini Tab -->
        <path d="M5 -17 L10 -25 Q11 -27 13 -27 L35 -27 Q37 -27 38 -25 L43 -17 Z" fill="#bc7155" opacity="0.15" />
        <line x1="12" y1="-22" x2="28" y2="-22" stroke="#bc7155" stroke-width="1" opacity="0.5" />

        <!-- Code Lines (Formatted structure) -->
        <!-- Line 1 -->
        <rect x="-43" y="-7" width="20" height="3.5" rx="1.75" fill="url(#sienna-gradient)" opacity="0.8" />
        <rect x="-18" y="-7" width="40" height="3.5" rx="1.75" fill="url(#sienna-gradient)" opacity="0.5" />
        
        <!-- Line 2 (Nested Block) -->
        <rect x="-43" y="3" width="12" height="3.5" rx="1.75" fill="url(#sienna-gradient)" opacity="0.4" />
        <rect x="-26" y="3" width="54" height="3.5" rx="1.75" fill="url(#sienna-gradient)" />
        
        <!-- Line 3 (Nested Block 2) -->
        <rect x="-43" y="13" width="12" height="3.5" rx="1.75" fill="url(#sienna-gradient)" opacity="0.4" />
        <rect x="-26" y="13" width="35" height="3.5" rx="1.75" fill="url(#sienna-gradient)" opacity="0.7" />
        <circle cx="15" cy="14.75" r="2" fill="url(#sienna-gradient)" />
        
        <!-- Line 4 -->
        <rect x="-43" y="23" width="28" height="3.5" rx="1.75" fill="url(#sienna-gradient)" opacity="0.6" />
    </g>
</svg>
