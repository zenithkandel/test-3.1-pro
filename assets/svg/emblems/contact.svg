<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <g stroke="#bc7155" stroke-width="1" opacity="0.3">
        <path d="M12 12 L12 22 M12 12 L22 12"/>
        <path d="M188 12 L188 22 M188 12 L178 12"/>
        <path d="M12 188 L12 178 M12 188 L22 188"/>
        <path d="M188 188 L188 178 M188 188 L178 188"/>
    </g>

    <!-- Minimalist Envelope transitioning to Paper Plane -->
    <rect x="40" y="80" width="60" height="40" fill="none" stroke="#bc7155" stroke-width="1.5" opacity="0.4"/>
    <!-- Envelope flaps -->
    <path d="M 40 80 L 70 100 L 100 80" fill="none" stroke="#bc7155" stroke-width="1.5" opacity="0.4" stroke-linejoin="round"/>
    
    <!-- Paper Plane taking off -->
    <path d="M 85 90 L 160 55 L 115 130 L 100 100 Z" fill="#bc7155" fill-opacity="0.1" stroke="#bc7155" stroke-width="2" stroke-linejoin="round"/>
    <line x1="85" y1="90" x2="115" y2="130" stroke="#bc7155" stroke-width="2"/>
    <line x1="160" y1="55" x2="100" y2="100" stroke="#bc7155" stroke-width="2"/>
    
    <!-- Flight Path -->
    <path d="M 60 140 Q 80 150 105 135" fill="none" stroke="#bc7155" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>
</svg>
