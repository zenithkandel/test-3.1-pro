<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Sienna Gradient for primary elements -->
        <linearGradient id="sienna-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#bc7155" />
            <stop offset="50%" stop-color="#d98f72" />
            <stop offset="100%" stop-color="#914d33" />
        </linearGradient>
        <!-- Soft Radial Glow Background -->
        <radialGradient id="glow-bg" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#bc7155" stop-opacity="0.14" />
            <stop offset="100%" stop-color="#bc7155" stop-opacity="0" />
        </radialGradient>
    </defs>

    <!-- Corner registration marks -->
    <g stroke="#bc7155" stroke-width="1" opacity="0.3">
        <path d="M12 12 L12 22 M12 12 L22 12"/>
        <path d="M188 12 L188 22 M188 12 L178 12"/>
        <path d="M12 188 L12 178 M12 188 L22 188"/>
        <path d="M188 188 L188 178 M188 188 L178 188"/>
    </g>

    <!-- Background Glow -->
    <circle cx="100" cy="100" r="80" fill="url(#glow-bg)" />

    <!-- Technical circular grid lines -->
    <g stroke="url(#sienna-gradient)" stroke-width="0.6" opacity="0.12">
        <circle cx="100" cy="100" r="75" stroke-dasharray="4 8" />
        <circle cx="100" cy="100" r="50" />
    </g>

    <!-- Curved Flight Trail (Dashed signal path) -->
    <path d="M 32 158 Q 50 154 68 132 T 95 115" stroke="url(#sienna-gradient)" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 5" opacity="0.6" fill="none" />
    <path d="M 40 166 Q 54 162 70 144" stroke="url(#sienna-gradient)" stroke-width="0.8" stroke-linecap="round" stroke-dasharray="2 4" opacity="0.3" fill="none" />

    <!-- Sending/Signal Expansion Waves in front of nose -->
    <g stroke="url(#sienna-gradient)" stroke-linecap="round" fill="none">
        <path d="M 154 44 A 20 20 0 0 1 166 60" stroke-width="1.2" opacity="0.5" />
        <path d="M 160 38 A 30 30 0 0 1 178 62" stroke-width="0.8" opacity="0.3" />
        <path d="M 166 32 A 40 40 0 0 1 190 64" stroke-width="0.6" opacity="0.15" />
    </g>

    <!-- 3D Origami Paper Plane -->
    <g transform="translate(4, -4)">
        <!-- Underbody Shadow / Fold 1 (Left Side) -->
        <path d="M 150 55 L 75 120 L 95 115 Z" fill="#753c23" opacity="0.6" stroke="url(#sienna-gradient)" stroke-width="0.5" />
        <!-- Underbody Shadow / Fold 2 (Right Side) -->
        <path d="M 150 55 L 95 115 L 110 95 Z" fill="#914d33" opacity="0.8" stroke="url(#sienna-gradient)" stroke-width="0.5" />
        
        <!-- Main Left Wing (In slight shadow) -->
        <path d="M 150 55 L 95 115 L 55 125 Z" fill="#bc7155" fill-opacity="0.7" stroke="url(#sienna-gradient)" stroke-width="1.2" stroke-linejoin="round" />
        
        <!-- Main Right Wing (Facing light) -->
        <path d="M 150 55 L 125 75 L 95 115 Z" fill="#bc7155" fill-opacity="0.95" stroke="url(#sienna-gradient)" stroke-width="1.5" stroke-linejoin="round" />

        <!-- Accent Wing Fold Lines -->
        <line x1="150" y1="55" x2="95" y2="115" stroke="#ffffff" stroke-width="0.6" opacity="0.3" />
    </g>
</svg>
