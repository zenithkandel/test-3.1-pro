<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" width="360" height="280" role="img" aria-label="Edu Track Pro: RFID attendance diagram">
  <defs>
    <pattern id="hatch5" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#1a1612" stroke-width="0.6"/>
    </pattern>
    <pattern id="hatch5d" patternUnits="userSpaceOnUse" width="3" height="3" patternTransform="rotate(135)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#1a1612" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect x="0.5" y="0.5" width="359" height="279" fill="none" stroke="#1a1612" stroke-width="1"/>
  <rect x="8" y="8" width="344" height="264" fill="none" stroke="#1a1612" stroke-width="0.5" stroke-dasharray="2 3"/>

  <g font-family="Special Elite, Courier, monospace" fill="#1a1612">
    <text x="20" y="28" font-size="8" letter-spacing="2">PLATE VI.</text>
    <text x="340" y="28" font-size="8" letter-spacing="2" text-anchor="end">FIG. 5</text>
    <text x="180" y="260" font-size="8" letter-spacing="2" text-anchor="middle">EDU TRACK PRO — RFID ATTENDANCE</text>
  </g>

  <!-- RFID card -->
  <g fill="none" stroke="#1a1612" stroke-width="1.2" stroke-linejoin="round">
    <rect x="40" y="80" width="120" height="75" rx="4" fill="#f1e8d3"/>
    <!-- header bar -->
    <rect x="40" y="80" width="120" height="14" fill="#1a1612"/>
    <text x="48" y="90" font-family="Special Elite, Courier, monospace" font-size="6" fill="#f1e8d3" letter-spacing="1">KMSS · STUDENT ID</text>
    <!-- photo box -->
    <rect x="48" y="100" width="28" height="32" fill="url(#hatch5)"/>
    <circle cx="62" cy="112" r="4" fill="none" stroke="#1a1612" stroke-width="0.6"/>
    <path d="M53 132 Q62 124 71 132" fill="none" stroke="#1a1612" stroke-width="0.6"/>
    <!-- name lines -->
    <line x1="82" y1="106" x2="152" y2="106" stroke-width="0.6"/>
    <line x1="82" y1="114" x2="140" y2="114" stroke-width="0.6"/>
    <line x1="82" y1="122" x2="148" y2="122" stroke-width="0.6"/>
    <text x="82" y="106" font-family="Special Elite, Courier, monospace" font-size="6" fill="#1a1612">ZENITH KANDEL</text>
    <text x="82" y="114" font-family="Special Elite, Courier, monospace" font-size="5" fill="#5a4f3f">GRADE 12 · KMSS</text>
    <text x="82" y="122" font-family="Special Elite, Courier, monospace" font-size="5" fill="#5a4f3f">ID 9806-176-120</text>
    <!-- RFID chip coil -->
    <g transform="translate(50 138)">
      <rect x="0" y="0" width="30" height="22" fill="none" stroke="#1a1612" stroke-width="0.5"/>
      <rect x="3" y="3" width="24" height="16" fill="none" stroke="#1a1612" stroke-width="0.4"/>
      <path d="M0 6 L30 6 M0 12 L30 12 M0 18 L30 18" stroke-width="0.4"/>
      <path d="M6 0 L6 22 M12 0 L12 22 M18 0 L18 22 M24 0 L24 22" stroke-width="0.4"/>
      <circle cx="15" cy="11" r="3" fill="none" stroke="#1a1612" stroke-width="0.5"/>
    </g>
    <text x="86" y="148" font-family="Special Elite, Courier, monospace" font-size="5" fill="#5a4f3f">RFID 13.56 MHz</text>
  </g>

  <!-- radio waves from card -->
  <g fill="none" stroke="#a8321e" stroke-width="1" stroke-linecap="round" opacity="0.85">
    <path d="M170 90 Q190 80 200 100" stroke-dasharray="3 2"/>
    <path d="M175 100 Q200 90 215 110" stroke-dasharray="3 2"/>
    <path d="M180 115 Q210 105 230 125" stroke-dasharray="3 2"/>
    <path d="M185 130 Q220 120 245 140" stroke-dasharray="3 2"/>
    <path d="M190 145 Q230 135 260 155" stroke-dasharray="3 2" opacity="0.6"/>
    <path d="M195 158 Q240 148 275 165" stroke-dasharray="3 2" opacity="0.5"/>
  </g>

  <!-- RFID reader device -->
  <g fill="none" stroke="#1a1612" stroke-width="1.2" stroke-linejoin="round">
    <rect x="220" y="100" width="60" height="70" rx="3" fill="#f1e8d3"/>
    <!-- screen -->
    <rect x="226" y="108" width="48" height="22" fill="#1a1612"/>
    <text x="250" y="118" text-anchor="middle" font-family="Special Elite, Courier, monospace" font-size="5" fill="#e8c14a">SCAN ID</text>
    <text x="250" y="126" text-anchor="middle" font-family="Special Elite, Courier, monospace" font-size="4" fill="#e8c14a">Z. KANDEL</text>
    <!-- leds -->
    <circle cx="234" cy="140" r="2" fill="#a8321e"/>
    <circle cx="244" cy="140" r="2" fill="none" stroke="#1a1612" stroke-width="0.5"/>
    <circle cx="254" cy="140" r="2" fill="none" stroke="#1a1612" stroke-width="0.5"/>
    <!-- button -->
    <circle cx="265" cy="140" r="2.5" fill="none" stroke="#1a1612" stroke-width="0.6"/>
    <circle cx="265" cy="140" r="1" fill="#1a1612"/>
    <!-- keypad -->
    <g fill="#1a1612">
      <rect x="228" y="148" width="6" height="4"/>
      <rect x="236" y="148" width="6" height="4"/>
      <rect x="244" y="148" width="6" height="4"/>
      <rect x="252" y="148" width="6" height="4"/>
      <rect x="260" y="148" width="6" height="4"/>
      <rect x="228" y="156" width="6" height="4"/>
      <rect x="236" y="156" width="6" height="4"/>
      <rect x="244" y="156" width="6" height="4"/>
      <rect x="252" y="156" width="6" height="4"/>
      <rect x="260" y="156" width="6" height="4"/>
    </g>
    <!-- antenna coil on front -->
    <g transform="translate(280 110)">
      <path d="M0 0 Q-4 5 0 10 Q4 5 0 0" fill="none" stroke="#1a1612" stroke-width="0.5"/>
      <path d="M0 0 Q-6 7 0 14 Q6 7 0 0" fill="none" stroke="#1a1612" stroke-width="0.5"/>
      <path d="M0 0 Q-8 9 0 18 Q8 9 0 0" fill="none" stroke="#1a1612" stroke-width="0.5"/>
    </g>
  </g>

  <!-- attendance sheet/roster -->
  <g fill="none" stroke="#1a1612" stroke-width="1.2" stroke-linejoin="round">
    <rect x="120" y="170" width="140" height="70" fill="#f1e8d3"/>
    <line x1="120" y1="180" x2="260" y2="180" stroke-width="0.6"/>
    <text x="125" y="178" font-family="Special Elite, Courier, monospace" font-size="6" fill="#1a1612">ATTENDANCE · GRADE 12</text>
    <!-- rows -->
    <g font-family="Special Elite, Courier, monospace" font-size="5" fill="#1a1612">
      <line x1="125" y1="192" x2="145" y2="192" stroke-width="0.4"/>
      <line x1="155" y1="192" x2="220" y2="192" stroke-width="0.4"/>
      <line x1="225" y1="192" x2="255" y2="192" stroke-width="0.4"/>
      <text x="125" y="195">001</text>
      <text x="155" y="195">KANDEL Z.</text>
      <text x="225" y="195" fill="#a8321e">PRESENT</text>

      <line x1="125" y1="202" x2="145" y2="202" stroke-width="0.4"/>
      <line x1="155" y1="202" x2="220" y2="202" stroke-width="0.4"/>
      <line x1="225" y1="202" x2="255" y2="202" stroke-width="0.4"/>
      <text x="125" y="205">002</text>
      <text x="155" y="205">SHARMA A.</text>
      <text x="225" y="205" fill="#a8321e">PRESENT</text>

      <line x1="125" y1="212" x2="145" y2="212" stroke-width="0.4"/>
      <line x1="155" y1="212" x2="220" y2="212" stroke-width="0.4"/>
      <line x1="225" y1="212" x2="255" y2="212" stroke-width="0.4"/>
      <text x="125" y="215">003</text>
      <text x="155" y="215">THAPA R.</text>
      <text x="225" y="215" fill="#5a4f3f">PENDING</text>

      <line x1="125" y1="222" x2="145" y2="222" stroke-width="0.4"/>
      <line x1="155" y1="222" x2="220" y2="222" stroke-width="0.4"/>
      <line x1="225" y1="222" x2="255" y2="222" stroke-width="0.4"/>
      <text x="125" y="225">004</text>
      <text x="155" y="225">GURUNG P.</text>
      <text x="225" y="225" fill="#5a4f3f">PENDING</text>

      <line x1="125" y1="232" x2="145" y2="232" stroke-width="0.4"/>
      <line x1="155" y1="232" x2="220" y2="232" stroke-width="0.4"/>
      <line x1="225" y1="232" x2="255" y2="232" stroke-width="0.4"/>
      <text x="125" y="235">005</text>
      <text x="155" y="235">RAI S.</text>
      <text x="225" y="235" fill="#5a4f3f">PENDING</text>
    </g>
  </g>

  <!-- signal to roster -->
  <g fill="none" stroke="#a8321e" stroke-width="0.8" stroke-dasharray="3 2" opacity="0.6">
    <path d="M250 170 Q230 165 200 170"/>
  </g>
  <g fill="#a8321e" opacity="0.7">
    <path d="M200 170 L205 167 L205 173 Z"/>
  </g>

  <!-- callouts -->
  <g stroke="#a8321e" stroke-width="0.7" fill="none">
    <line x1="100" y1="80" x2="100" y2="55"/>
    <line x1="100" y1="55" x2="60" y2="55"/>
  </g>
  <text x="20" y="50" font-family="Special Elite, Courier, monospace" font-size="6.5" letter-spacing="1" fill="#1a1612">A — STUDENT ID CARD</text>

  <g stroke="#a8321e" stroke-width="0.7" fill="none">
    <line x1="285" y1="100" x2="320" y2="80"/>
    <line x1="320" y1="80" x2="340" y2="80"/>
  </g>
  <text x="295" y="72" font-family="Special Elite, Courier, monospace" font-size="6.5" letter-spacing="1" fill="#1a1612">B — READER</text>

  <g stroke="#a8321e" stroke-width="0.7" fill="none">
    <line x1="190" y1="170" x2="190" y2="245"/>
    <line x1="190" y1="245" x2="150" y2="245"/>
  </g>
  <text x="20" y="248" font-family="Special Elite, Courier, monospace" font-size="6.5" letter-spacing="1" fill="#1a1612">C — LIVE ROSTER</text>

  <!-- stamp -->
  <g transform="translate(280 230) rotate(-6)">
    <rect x="0" y="0" width="62" height="20" fill="none" stroke="#a8321e" stroke-width="0.9" opacity="0.75"/>
    <text x="31" y="13" text-anchor="middle" font-family="Special Elite, Courier, monospace" font-size="7" letter-spacing="2" fill="#a8321e" opacity="0.85">SHIPPED</text>
  </g>
</svg>
