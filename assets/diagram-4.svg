<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" width="360" height="280" role="img" aria-label="AgroPan: soil monitoring and recommendation system">
  <defs>
    <pattern id="hatch4" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#1a1612" stroke-width="0.6"/>
    </pattern>
    <pattern id="hatch4d" patternUnits="userSpaceOnUse" width="3" height="3" patternTransform="rotate(135)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#1a1612" stroke-width="0.6"/>
    </pattern>
    <pattern id="hatch4dense" patternUnits="userSpaceOnUse" width="2.5" height="2.5" patternTransform="rotate(0)">
      <line x1="0" y1="0" x2="0" y2="2.5" stroke="#1a1612" stroke-width="0.7"/>
    </pattern>
  </defs>

  <rect x="0.5" y="0.5" width="359" height="279" fill="none" stroke="#1a1612" stroke-width="1"/>
  <rect x="8" y="8" width="344" height="264" fill="none" stroke="#1a1612" stroke-width="0.5" stroke-dasharray="2 3"/>

  <g font-family="Special Elite, Courier, monospace" fill="#1a1612">
    <text x="20" y="28" font-size="8" letter-spacing="2">PLATE V.</text>
    <text x="340" y="28" font-size="8" letter-spacing="2" text-anchor="end">FIG. 4</text>
    <text x="180" y="260" font-size="8" letter-spacing="2" text-anchor="middle">AGROPAN — SOIL MONITOR &amp; RECOMMENDATION</text>
  </g>

  <!-- sky -->
  <g fill="none" stroke="#1a1612" stroke-width="0.5" opacity="0.4">
    <line x1="20" y1="60" x2="340" y2="60"/>
  </g>

  <!-- sun -->
  <g stroke="#1a1612" stroke-width="1" fill="none">
    <circle cx="290" cy="70" r="14"/>
    <g stroke-width="0.8">
      <line x1="290" y1="48" x2="290" y2="52"/>
      <line x1="290" y1="88" x2="290" y2="92"/>
      <line x1="268" y1="70" x2="272" y2="70"/>
      <line x1="308" y1="70" x2="312" y2="70"/>
      <line x1="274" y1="54" x2="277" y2="57"/>
      <line x1="303" y1="83" x2="306" y2="86"/>
      <line x1="274" y1="86" x2="277" y2="83"/>
      <line x1="303" y1="57" x2="306" y2="54"/>
    </g>
  </g>

  <!-- ground surface -->
  <line x1="20" y1="160" x2="340" y2="160" stroke="#1a1612" stroke-width="1.4"/>
  <g stroke="#1a1612" stroke-width="0.6">
    <path d="M20 162 Q30 165 40 162 Q50 159 60 162"/>
    <path d="M80 162 Q90 165 100 162 Q110 159 120 162"/>
    <path d="M150 162 Q160 165 170 162 Q180 159 190 162"/>
    <path d="M220 162 Q230 165 240 162 Q250 159 260 162"/>
    <path d="M290 162 Q300 165 310 162 Q320 159 330 162"/>
  </g>

  <!-- soil layers -->
  <g stroke="#1a1612" stroke-width="0.5" stroke-dasharray="3 2" opacity="0.7">
    <line x1="20" y1="180" x2="340" y2="180"/>
    <line x1="20" y1="210" x2="340" y2="210"/>
    <line x1="20" y1="235" x2="340" y2="235"/>
  </g>

  <!-- topsoil hatched -->
  <g>
    <rect x="20" y="160" width="320" height="20" fill="url(#hatch4)" opacity="0.6"/>
  </g>
  <!-- subsoil reverse hatch -->
  <g>
    <rect x="20" y="180" width="320" height="30" fill="url(#hatch4d)" opacity="0.5"/>
  </g>
  <!-- bedrock dense -->
  <g>
    <rect x="20" y="210" width="320" height="30" fill="url(#hatch4dense)" opacity="0.7"/>
  </g>

  <!-- layer labels -->
  <g font-family="Special Elite, Courier, monospace" font-size="6" fill="#5a4f3f" font-style="italic">
    <text x="335" y="173" text-anchor="end">TOPSOIL</text>
    <text x="335" y="200" text-anchor="end">SUBSOIL</text>
    <text x="335" y="232" text-anchor="end">BEDROCK</text>
  </g>

  <!-- plant -->
  <g fill="none" stroke="#1a1612" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="100" y1="160" x2="100" y2="120"/>
    <path d="M100 140 Q88 135 82 125 Q92 130 100 138"/>
    <path d="M100 135 Q112 130 118 120 Q108 125 100 133"/>
    <path d="M100 128 Q92 122 86 112 Q95 118 100 126"/>
    <path d="M100 124 Q108 118 114 108 Q105 114 100 122"/>
    <!-- leaves veins -->
    <path d="M88 130 Q92 132 96 134" stroke-width="0.5"/>
    <path d="M112 130 Q108 132 104 134" stroke-width="0.5"/>
  </g>

  <!-- sensor probe in ground -->
  <g fill="none" stroke="#1a1612" stroke-width="1.2" stroke-linejoin="round">
    <rect x="200" y="155" width="30" height="14" fill="#f1e8d3"/>
    <circle cx="207" cy="162" r="1.5" fill="#1a1612"/>
    <circle cx="215" cy="162" r="1.5" fill="#a8321e"/>
    <rect x="223" y="158" width="5" height="9" fill="none" stroke="#1a1612" stroke-width="0.6"/>
    <text x="215" y="167" text-anchor="middle" font-family="Special Elite, Courier, monospace" font-size="5" fill="#1a1612">μC</text>
    <!-- probe shaft -->
    <line x1="215" y1="169" x2="215" y2="225" stroke-width="1.2"/>
    <!-- sensor tips -->
    <line x1="211" y1="190" x2="219" y2="190" stroke-width="0.8"/>
    <line x1="211" y1="205" x2="219" y2="205" stroke-width="0.8"/>
    <line x1="211" y1="220" x2="219" y2="220" stroke-width="0.8"/>
    <circle cx="215" cy="190" r="1" fill="#1a1612"/>
    <circle cx="215" cy="205" r="1" fill="#1a1612"/>
    <circle cx="215" cy="220" r="1" fill="#1a1612"/>
  </g>

  <!-- moisture droplets -->
  <g fill="#1a1612" opacity="0.6">
    <path d="M70 195 Q70 191 73 195 Q70 199 70 195" />
    <path d="M50 175 Q50 171 53 175 Q50 179 50 175" />
    <path d="M150 200 Q150 196 153 200 Q150 204 150 200" />
  </g>

  <!-- signal line up to display -->
  <g fill="none" stroke="#a8321e" stroke-width="0.9" stroke-dasharray="3 2" opacity="0.7">
    <path d="M230 162 Q260 130 280 100"/>
  </g>
  <g fill="#a8321e" opacity="0.85">
    <path d="M280 100 L275 102 L278 96 Z"/>
  </g>

  <!-- monitor / display in corner -->
  <g fill="none" stroke="#1a1612" stroke-width="1.2" stroke-linejoin="round">
    <rect x="240" y="55" width="80" height="45" fill="#f1e8d3"/>
    <line x1="240" y1="65" x2="320" y2="65" stroke-width="0.6"/>
    <text x="244" y="62" font-family="Special Elite, Courier, monospace" font-size="6" fill="#1a1612">DASHBOARD</text>
    <!-- bars -->
    <rect x="246" y="70" width="14" height="22" fill="none" stroke="#1a1612" stroke-width="0.5"/>
    <rect x="248" y="78" width="10" height="12" fill="url(#hatch4)"/>
    <rect x="263" y="70" width="14" height="22" fill="none" stroke="#1a1612" stroke-width="0.5"/>
    <rect x="265" y="74" width="10" height="16" fill="url(#hatch4)"/>
    <rect x="280" y="70" width="14" height="22" fill="none" stroke="#1a1612" stroke-width="0.5"/>
    <rect x="282" y="82" width="10" height="8" fill="url(#hatch4)"/>
    <rect x="297" y="70" width="14" height="22" fill="none" stroke="#1a1612" stroke-width="0.5"/>
    <rect x="299" y="76" width="10" height="14" fill="url(#hatch4)"/>
    <line x1="240" y1="95" x2="320" y2="95" stroke-width="0.6"/>
    <text x="244" y="98" font-family="Special Elite, Courier, monospace" font-size="4.5" fill="#1a1612" font-style="italic">pH · MOIST · N · K</text>
  </g>

  <!-- callouts -->
  <g stroke="#a8321e" stroke-width="0.7" fill="none">
    <line x1="100" y1="120" x2="60" y2="80"/>
    <line x1="60" y1="80" x2="35" y2="80"/>
  </g>
  <text x="20" y="74" font-family="Special Elite, Courier, monospace" font-size="6.5" letter-spacing="1" fill="#1a1612">A — PLANT</text>

  <g stroke="#a8321e" stroke-width="0.7" fill="none">
    <line x1="215" y1="225" x2="215" y2="245"/>
    <line x1="215" y1="245" x2="160" y2="245"/>
  </g>
  <text x="20" y="248" font-family="Special Elite, Courier, monospace" font-size="6.5" letter-spacing="1" fill="#1a1612">B — SOIL SENSOR PROBE</text>

  <g stroke="#a8321e" stroke-width="0.7" fill="none">
    <line x1="280" y1="78" x2="280" y2="60"/>
  </g>
  <text x="232" y="50" font-family="Special Elite, Courier, monospace" font-size="6.5" letter-spacing="1" fill="#1a1612">C — RECOMMENDATION</text>
</svg>
