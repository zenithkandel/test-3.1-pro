<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" width="360" height="280" role="img" aria-label="Lifeline: off-grid RF emergency signal diagram">
  <defs>
    <pattern id="hatch2" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#1a1612" stroke-width="0.6"/>
    </pattern>
    <pattern id="hatch2d" patternUnits="userSpaceOnUse" width="3" height="3" patternTransform="rotate(135)">
      <line x1="0" y1="0" x2="0" y2="3" stroke="#1a1612" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect x="0.5" y="0.5" width="359" height="279" fill="none" stroke="#1a1612" stroke-width="1"/>
  <rect x="8" y="8" width="344" height="264" fill="none" stroke="#1a1612" stroke-width="0.5" stroke-dasharray="2 3"/>

  <g font-family="Special Elite, Courier, monospace" fill="#1a1612">
    <text x="20" y="28" font-size="8" letter-spacing="2">PLATE III.</text>
    <text x="340" y="28" font-size="8" letter-spacing="2" text-anchor="end">FIG. 2</text>
    <text x="180" y="260" font-size="8" letter-spacing="2" text-anchor="middle">LIFELINE — OFF-GRID RF EMERGENCY SIGNAL</text>
  </g>

  <!-- mountain range in background -->
  <g fill="url(#hatch2)" stroke="#1a1612" stroke-width="1.2" stroke-linejoin="round">
    <path d="M20 220 L70 160 L100 180 L140 130 L180 165 L220 110 L260 150 L300 120 L340 160 L340 220 Z"/>
  </g>
  <g fill="none" stroke="#1a1612" stroke-width="0.6" opacity="0.6">
    <path d="M70 160 L80 175"/>
    <path d="M140 130 L155 150"/>
    <path d="M220 110 L235 130"/>
    <path d="M300 120 L310 140"/>
  </g>

  <!-- ground line -->
  <line x1="20" y1="220" x2="340" y2="220" stroke="#1a1612" stroke-width="1.4"/>
  <g stroke="#1a1612" stroke-width="0.6">
    <line x1="20" y1="222" x2="14" y2="226"/>
    <line x1="40" y1="222" x2="34" y2="226"/>
    <line x1="60" y1="222" x2="54" y2="226"/>
    <line x1="80" y1="222" x2="74" y2="226"/>
    <line x1="100" y1="222" x2="94" y2="226"/>
    <line x1="120" y1="222" x2="114" y2="226"/>
    <line x1="140" y1="222" x2="134" y2="226"/>
    <line x1="160" y1="222" x2="154" y2="226"/>
    <line x1="180" y1="222" x2="174" y2="226"/>
    <line x1="200" y1="222" x2="194" y2="226"/>
    <line x1="220" y1="222" x2="214" y2="226"/>
    <line x1="240" y1="222" x2="234" y2="226"/>
    <line x1="260" y1="222" x2="254" y2="226"/>
    <line x1="280" y1="222" x2="274" y2="226"/>
    <line x1="300" y1="222" x2="294" y2="226"/>
    <line x1="320" y1="222" x2="314" y2="226"/>
  </g>

  <!-- transmitter device (box) -->
  <g stroke="#1a1612" stroke-width="1.4" stroke-linejoin="round" fill="#f1e8d3">
    <rect x="58" y="180" width="54" height="40" rx="2"/>
    <!-- antenna -->
    <line x1="85" y1="180" x2="85" y2="140" stroke-width="1.4"/>
    <circle cx="85" cy="140" r="2.5" fill="#1a1612"/>
    <!-- leds -->
    <circle cx="68" cy="200" r="2" fill="#1a1612"/>
    <circle cx="78" cy="200" r="2" fill="none" stroke="#1a1612" stroke-width="0.6"/>
    <circle cx="88" cy="200" r="2" fill="#a8321e"/>
    <!-- screen -->
    <rect x="96" y="190" width="12" height="9" fill="none" stroke="#1a1612" stroke-width="0.6"/>
    <line x1="98" y1="193" x2="106" y2="193" stroke-width="0.4"/>
    <line x1="98" y1="195" x2="106" y2="195" stroke-width="0.4"/>
    <line x1="98" y1="197" x2="103" y2="197" stroke-width="0.4"/>
    <!-- keypad dots -->
    <g fill="#1a1612">
      <circle cx="68" cy="210" r="0.8"/>
      <circle cx="74" cy="210" r="0.8"/>
      <circle cx="80" cy="210" r="0.8"/>
      <circle cx="86" cy="210" r="0.8"/>
      <circle cx="92" cy="210" r="0.8"/>
      <circle cx="98" cy="210" r="0.8"/>
      <circle cx="104" cy="210" r="0.8"/>
    </g>
  </g>

  <!-- radio waves emanating -->
  <g fill="none" stroke="#a8321e" stroke-width="1.2" stroke-linecap="round" opacity="0.85">
    <path d="M85 140 Q105 130 100 110" stroke-dasharray="3 2"/>
    <path d="M85 140 Q70 130 75 110" stroke-dasharray="3 2"/>
    <path d="M85 140 Q120 130 115 100" stroke-dasharray="3 2"/>
    <path d="M85 140 Q55 130 60 100" stroke-dasharray="3 2"/>
    <path d="M85 140 Q140 140 145 95" stroke-width="0.7" opacity="0.5"/>
    <path d="M85 140 Q35 140 30 95" stroke-width="0.7" opacity="0.5"/>
  </g>

  <!-- receiver station on mountain -->
  <g fill="none" stroke="#1a1612" stroke-width="1.2" stroke-linejoin="round">
    <line x1="220" y1="110" x2="220" y2="80"/>
    <line x1="220" y1="80" x2="208" y2="76"/>
    <line x1="220" y1="80" x2="232" y2="76"/>
    <line x1="220" y1="80" x2="220" y2="68"/>
    <rect x="212" y="92" width="16" height="18" fill="#f1e8d3"/>
    <line x1="212" y1="98" x2="228" y2="98" stroke-width="0.6"/>
    <line x1="212" y1="103" x2="228" y2="103" stroke-width="0.6"/>
  </g>

  <!-- signal arrow -->
  <g fill="none" stroke="#a8321e" stroke-width="0.9" stroke-dasharray="3 2" opacity="0.7">
    <path d="M115 130 Q160 100 215 95"/>
  </g>
  <g fill="#a8321e" opacity="0.85">
    <path d="M215 95 L210 92 L213 98 Z"/>
  </g>

  <!-- callouts -->
  <g stroke="#a8321e" stroke-width="0.7" fill="none">
    <line x1="85" y1="140" x2="85" y2="60"/>
    <line x1="85" y1="60" x2="40" y2="55"/>
  </g>
  <text x="20" y="48" font-family="Special Elite, Courier, monospace" font-size="6.5" letter-spacing="1" fill="#1a1612">A — TRANSMIT ANTENNA</text>

  <g stroke="#a8321e" stroke-width="0.7" fill="none">
    <line x1="85" y1="200" x2="40" y2="200"/>
  </g>
  <text x="20" y="195" font-family="Special Elite, Courier, monospace" font-size="6.5" letter-spacing="1" fill="#1a1612">B — DEVICE BODY</text>

  <g stroke="#a8321e" stroke-width="0.7" fill="none">
    <line x1="220" y1="68" x2="220" y2="50"/>
    <line x1="220" y1="50" x2="285" y2="50"/>
  </g>
  <text x="290" y="46" font-family="Special Elite, Courier, monospace" font-size="6.5" letter-spacing="1" fill="#1a1612">C — RELAY STATION</text>

  <!-- stamp -->
  <g transform="translate(250 230) rotate(-4)">
    <rect x="0" y="0" width="80" height="20" fill="none" stroke="#a8321e" stroke-width="0.9" opacity="0.75"/>
    <text x="40" y="13" text-anchor="middle" font-family="Special Elite, Courier, monospace" font-size="7" letter-spacing="2" fill="#a8321e" opacity="0.85">FIELD-TESTED</text>
  </g>

  <!-- bottom legend -->
  <g font-family="Special Elite, Courier, monospace" font-size="6" fill="#5a4f3f">
    <line x1="20" y1="245" x2="40" y2="245" stroke="#a8321e" stroke-width="1" stroke-dasharray="3 2"/>
    <text x="44" y="248">RF SIGNAL PATH</text>
  </g>
</svg>
