<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 280" width="360" height="280" role="img" aria-label="Sawari: public transport route diagram">
  <defs>
    <pattern id="hatch3" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#1a1612" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect x="0.5" y="0.5" width="359" height="279" fill="none" stroke="#1a1612" stroke-width="1"/>
  <rect x="8" y="8" width="344" height="264" fill="none" stroke="#1a1612" stroke-width="0.5" stroke-dasharray="2 3"/>

  <g font-family="Special Elite, Courier, monospace" fill="#1a1612">
    <text x="20" y="28" font-size="8" letter-spacing="2">PLATE IV.</text>
    <text x="340" y="28" font-size="8" letter-spacing="2" text-anchor="end">FIG. 3</text>
    <text x="180" y="260" font-size="8" letter-spacing="2" text-anchor="middle">SAWARI — KATHMANDU BUS ROUTER</text>
  </g>

  <!-- map background grid -->
  <g stroke="#5a4f3f" stroke-width="0.3" opacity="0.4">
    <line x1="20" y1="60" x2="340" y2="60"/>
    <line x1="20" y1="100" x2="340" y2="100"/>
    <line x1="20" y1="140" x2="340" y2="140"/>
    <line x1="20" y1="180" x2="340" y2="180"/>
    <line x1="60" y1="50" x2="60" y2="220"/>
    <line x1="100" y1="50" x2="100" y2="220"/>
    <line x1="140" y1="50" x2="140" y2="220"/>
    <line x1="180" y1="50" x2="180" y2="220"/>
    <line x1="220" y1="50" x2="220" y2="220"/>
    <line x1="260" y1="50" x2="260" y2="220"/>
    <line x1="300" y1="50" x2="300" y2="220"/>
  </g>

  <!-- river (Bagmati) -->
  <g fill="none" stroke="#5a4f3f" stroke-width="0.8" stroke-dasharray="1 1" opacity="0.6">
    <path d="M20 180 Q60 175 90 180 Q120 185 160 178 Q200 172 240 180 Q280 188 320 180"/>
  </g>
  <text x="30" y="195" font-family="Special Elite, Courier, monospace" font-size="5" fill="#5a4f3f" font-style="italic">BAGMATI R.</text>

  <!-- route A: solid -->
  <g fill="none" stroke="#1a1612" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M40 220 Q60 200 80 180 Q100 160 130 140 Q160 120 190 110 Q220 100 250 90 Q280 80 320 70"/>
  </g>

  <!-- route B: alternate dashed -->
  <g fill="none" stroke="#a8321e" stroke-width="1.4" stroke-linecap="round" stroke-dasharray="4 3" opacity="0.85">
    <path d="M40 220 Q70 215 100 200 Q140 180 180 170 Q220 160 250 150 Q280 140 320 130"/>
  </g>

  <!-- bus shape -->
  <g fill="url(#hatch3)" stroke="#1a1612" stroke-width="1.2" stroke-linejoin="round">
    <path d="M170 122 L210 122 Q216 122 216 128 L216 138 Q216 144 210 144 L170 144 Q164 144 164 138 L164 128 Q164 122 170 122 Z"/>
    <!-- windows -->
    <rect x="170" y="127" width="10" height="8" fill="#f1e8d3"/>
    <rect x="184" y="127" width="10" height="8" fill="#f1e8d3"/>
    <rect x="198" y="127" width="10" height="8" fill="#f1e8d3"/>
    <!-- destination sign -->
    <rect x="178" y="120" width="24" height="3" fill="#a8321e"/>
    <!-- wheels -->
    <circle cx="174" cy="146" r="3" fill="#f1e8d3"/>
    <circle cx="206" cy="146" r="3" fill="#f1e8d3"/>
    <circle cx="174" cy="146" r="1" fill="#1a1612"/>
    <circle cx="206" cy="146" r="1" fill="#1a1612"/>
  </g>

  <!-- stops on route A -->
  <g fill="#f1e8d3" stroke="#1a1612" stroke-width="1.2">
    <circle cx="40" cy="220" r="4"/>
    <circle cx="80" cy="180" r="4"/>
    <circle cx="130" cy="140" r="4"/>
    <circle cx="190" cy="110" r="4"/>
    <circle cx="250" cy="90" r="4"/>
    <circle cx="320" cy="70" r="4"/>
  </g>

  <!-- stop labels -->
  <g font-family="Special Elite, Courier, monospace" font-size="5.5" fill="#1a1612">
    <text x="40" y="237" text-anchor="middle">RATNA PARK</text>
    <text x="80" y="195" text-anchor="middle">NEW RD.</text>
    <text x="130" y="135" text-anchor="middle">BAGBAZAR</text>
    <text x="190" y="105" text-anchor="middle">SORHANKHUTTI</text>
    <text x="250" y="85" text-anchor="middle">KOTESHWOR</text>
    <text x="320" y="65" text-anchor="middle">BHAKTAPUR</text>
  </g>

  <!-- bus route label -->
  <text x="190" y="103" font-family="Special Elite, Courier, monospace" font-size="5.5" fill="#1a1612">RTE 12</text>

  <!-- compass -->
  <g stroke="#1a1612" stroke-width="0.8" fill="none" transform="translate(310 200)">
    <circle cx="0" cy="0" r="14"/>
    <path d="M0 -10 L3 0 L0 10 L-3 0 Z" fill="#1a1612"/>
    <text x="0" y="-16" text-anchor="middle" font-family="Special Elite, Courier, monospace" font-size="6" fill="#1a1612">N</text>
  </g>

  <!-- callouts -->
  <g stroke="#a8321e" stroke-width="0.7" fill="none">
    <line x1="190" y1="110" x2="190" y2="60"/>
    <line x1="190" y1="60" x2="245" y2="60"/>
  </g>
  <text x="250" y="56" font-family="Special Elite, Courier, monospace" font-size="6.5" letter-spacing="1" fill="#1a1612">A — TRANSFER STOP</text>

  <g stroke="#a8321e" stroke-width="0.7" fill="none">
    <line x1="190" y1="135" x2="280" y2="135"/>
  </g>
  <text x="285" y="132" font-family="Special Elite, Courier, monospace" font-size="6.5" letter-spacing="1" fill="#1a1612">B — LIVE BUS POSITION</text>

  <!-- legend -->
  <g font-family="Special Elite, Courier, monospace" font-size="6" fill="#1a1612">
    <line x1="20" y1="248" x2="35" y2="248" stroke="#1a1612" stroke-width="2"/>
    <text x="40" y="251">PRIMARY ROUTE</text>
    <line x1="135" y1="248" x2="150" y2="248" stroke="#a8321e" stroke-width="1.4" stroke-dasharray="4 3"/>
    <text x="155" y="251">ALTERNATE</text>
  </g>
</svg>
