            <path d="M0 0 L26 12 M0 0 L-26 12 M0 0 L0 -18" stroke="#bc7155" stroke-width="1" opacity="0.5"/>
        </g>
        <!-- Middle cube -->
        <g transform="translate(0, -10)">
            <path d="M0 -18 L26 -6 L26 12 L0 24 L-26 12 L-26 -6 Z" fill="#ffffff" stroke="#bc7155" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M0 0 L26 12 M0 0 L-26 12 M0 0 L0 -18" stroke="#bc7155" stroke-width="1" opacity="0.5"/>
        </g>
        <!-- Top cube -->
        <g transform="translate(30, -32)">
            <path d="M0 -18 L26 -6 L26 12 L0 24 L-26 12 L-26 -6 Z" fill="#bc7155" stroke="#bc7155" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M0 0 L26 12 M0 0 L-26 12 M0 0 L0 -18" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
