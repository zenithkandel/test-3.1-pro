<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Corner registration marks -->
    <path d="M10 10 L10 22 M10 10 L22 10" stroke="#bc7155" stroke-width="1.5" stroke-linecap="square"/>
    <path d="M190 10 L190 22 M190 10 L178 10" stroke="#bc7155" stroke-width="1.5" stroke-linecap="square"/>
    <path d="M10 190 L10 178 M10 190 L22 190" stroke="#bc7155" stroke-width="1.5" stroke-linecap="square"/>
    <path d="M190 190 L190 178 M190 190 L178 190" stroke="#bc7155" stroke-width="1.5" stroke-linecap="square"/>

    <!-- Left device -->
    <g transform="translate(46, 120)">
        <!-- box body -->
        <rect x="-24" y="-22" width="48" height="44" rx="4" fill="#ffffff" stroke="#bc7155" stroke-width="2"/>
        <!-- inner screen -->
        <rect x="-17" y="-15" width="34" height="20" rx="2" fill="none" stroke="#bc7155" stroke-width="1" opacity="0.5"/>
        <!-- waveform on screen -->
        <path d="M-13 -5 L-9 -5 L-7 -10 L-3 0 L1 -7 L5 -5 L9 -5 L13 -5" stroke="#bc7155" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <!-- LED + ports -->
        <circle cx="-10" cy="14" r="2" fill="#bc7155"/>
        <circle cx="10" cy="14" r="2" fill="none" stroke="#bc7155" stroke-width="1" opacity="0.5"/>
        <!-- antenna -->
        <line x1="0" y1="-22" x2="0" y2="-44" stroke="#bc7155" stroke-width="2" stroke-linecap="round"/>
        <circle cx="0" cy="-46" r="3.5" fill="#bc7155"/>
    </g>

    <!-- Right device -->
    <g transform="translate(154, 120)">
        <rect x="-24" y="-22" width="48" height="44" rx="4" fill="#ffffff" stroke="#bc7155" stroke-width="2"/>
        <rect x="-17" y="-15" width="34" height="20" rx="2" fill="none" stroke="#bc7155" stroke-width="1" opacity="0.5"/>
        <!-- signal bars on screen -->
        <rect x="-12" y="0" width="3" height="3" fill="#bc7155"/>
        <rect x="-6" y="-3" width="3" height="6" fill="#bc7155"/>
        <rect x="0" y="-6" width="3" height="9" fill="#bc7155"/>
        <rect x="6" y="-9" width="3" height="12" fill="#bc7155"/>
        <circle cx="-10" cy="14" r="2" fill="none" stroke="#bc7155" stroke-width="1" opacity="0.5"/>
        <circle cx="10" cy="14" r="2" fill="#bc7155"/>
        <line x1="0" y1="-22" x2="0" y2="-44" stroke="#bc7155" stroke-width="2" stroke-linecap="round"/>
        <circle cx="0" cy="-46" r="3.5" fill="#bc7155"/>
    </g>

    <!-- RF waves between antennas -->
    <g transform="translate(100, 74)">
        <!-- arc 1 (small, left side) -->
        <path d="M-50 0 Q-42 -10 -34 0" stroke="#bc7155" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        <!-- arc 2 -->
        <path d="M-30 0 Q-22 -14 -14 0" stroke="#bc7155" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        <!-- arc 3 (center peak) -->
        <path d="M-10 0 Q0 -18 10 0" stroke="#bc7155" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        <!-- arc 4 (right) -->
        <path d="M14 0 Q22 -14 30 0" stroke="#bc7155" stroke-width="1.4" stroke-linecap="round" fill="none"/>
        <!-- arc 5 -->
        <path d="M34 0 Q42 -10 50 0" stroke="#bc7155" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    </g>

    <!-- Base ground line -->
    <line x1="22" y1="170" x2="178" y2="170" stroke="#bc7155" stroke-width="1.5"/>
    <line x1="30" y1="174" x2="60" y2="174" stroke="#bc7155" stroke-width="1" opacity="0.4"/>
    <line x1="70" y1="174" x2="130" y2="174" stroke="#bc7155" stroke-width="1" opacity="0.4"/>
    <line x1="140" y1="174" x2="170" y2="174" stroke="#bc7155" stroke-width="1" opacity="0.4"/>

    <!-- SOS pulse dot -->
    <circle cx="100" cy="36" r="4" fill="#bc7155"/>
    <circle cx="100" cy="36" r="8" fill="none" stroke="#bc7155" stroke-width="1" stroke-dasharray="2 2" opacity="0.5"/>
</svg>
