<svg width="280" height="200" viewBox="0 0 280 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Layered project cards -->
    <g transform="translate(0, 0)">
        <!-- Back card (offset) -->
        <rect x="30" y="20" width="200" height="140" rx="14" fill="none" stroke="#000d10" stroke-width="1.5" opacity="0.25"/>
        <!-- Middle card -->
        <rect x="20" y="30" width="200" height="140" rx="14" fill="#ffffff" stroke="#000d10" stroke-width="1.5" opacity="0.55"/>
        <!-- Front card -->
        <rect x="10" y="40" width="200" height="140" rx="14" fill="#ffffff" stroke="#000d10" stroke-width="2"/>

        <!-- Card content lines -->
        <line x1="28" y1="64" x2="100" y2="64" stroke="#000d10" stroke-width="1.5"/>
        <line x1="28" y1="78" x2="80" y2="78" stroke="#8e8e95" stroke-width="1.2"/>
        <line x1="28" y1="92" x2="120" y2="92" stroke="#8e8e95" stroke-width="1.2"/>
        <line x1="28" y1="106" x2="100" y2="106" stroke="#8e8e95" stroke-width="1.2"/>
        <line x1="28" y1="120" x2="140" y2="120" stroke="#8e8e95" stroke-width="1.2"/>

        <!-- Tag pills -->
        <rect x="28" y="140" width="40" height="20" rx="100" fill="#000d10"/>
        <rect x="74" y="140" width="40" height="20" rx="100" fill="none" stroke="#000d10"/>
        <rect x="120" y="140" width="40" height="20" rx="100" fill="none" stroke="#000d10"/>
    </g>

    <!-- Number indicator (orange) -->
    <g transform="translate(220, 60)">
        <circle cx="20" cy="20" r="20" fill="#bc7155"/>
        <text x="20" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#ffffff">05</text>
    </g>

    <!-- Arrow indicator -->
    <g transform="translate(220, 120)">
        <rect x="0" y="0" width="40" height="40" rx="100" fill="#ffffff" stroke="#000d10" stroke-width="1.5"/>
        <path d="M14 20 L26 20 M22 16 L26 20 L22 24" stroke="#000d10" stroke-width="1.5" stroke-linecap="square" fill="none"/>
    </g>
</svg>
