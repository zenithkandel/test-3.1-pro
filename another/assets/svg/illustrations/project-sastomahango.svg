<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Corner registration marks -->
    <path d="M10 10 L10 22 M10 10 L22 10" stroke="#bc7155" stroke-width="1.5" stroke-linecap="square"/>
    <path d="M190 10 L190 22 M190 10 L178 10" stroke="#bc7155" stroke-width="1.5" stroke-linecap="square"/>
    <path d="M10 190 L10 178 M10 190 L22 190" stroke="#bc7155" stroke-width="1.5" stroke-linecap="square"/>
    <path d="M190 190 L190 178 M190 190 L178 190" stroke="#bc7155" stroke-width="1.5" stroke-linecap="square"/>

    <!-- Central price tag (tilted) -->
    <g transform="translate(102, 102) rotate(-14)">
        <path d="M-34 -24 L16 -24 L36 0 L16 24 L-34 24 Z" fill="#ffffff" stroke="#bc7155" stroke-width="2" stroke-linejoin="round"/>
        <circle cx="22" cy="0" r="4" fill="none" stroke="#bc7155" stroke-width="1.5"/>
        <text x="-10" y="9" text-anchor="middle" font-family="Inter, sans-serif" font-size="34" font-weight="800" fill="#bc7155">$</text>
    </g>

    <!-- Coin (top left) -->
    <g transform="translate(48, 50)">
        <circle cx="0" cy="0" r="13" fill="#ffffff" stroke="#bc7155" stroke-width="1.8"/>
        <circle cx="0" cy="0" r="9" fill="none" stroke="#bc7155" stroke-width="1" opacity="0.45"/>
        <text x="0" y="5" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#bc7155">$</text>
    </g>

    <!-- Coin (top right, filled) -->
    <g transform="translate(156, 44)">
        <circle cx="0" cy="0" r="11" fill="#bc7155" stroke="#bc7155" stroke-width="1.5"/>
        <text x="0" y="5" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="800" fill="#ffffff">¢</text>
    </g>

    <!-- Coin stack (bottom right) -->
    <g transform="translate(160, 150)">
        <ellipse cx="0" cy="6" rx="14" ry="3.5" fill="#ffffff" stroke="#bc7155" stroke-width="1.5"/>
        <line x1="-14" y1="3" x2="-14" y2="0" stroke="#bc7155" stroke-width="1.5"/>
        <line x1="14" y1="3" x2="14" y2="0" stroke="#bc7155" stroke-width="1.5"/>
        <ellipse cx="0" cy="0" rx="14" ry="3.5" fill="none" stroke="#bc7155" stroke-width="1.5"/>
        <ellipse cx="0" cy="-5" rx="14" ry="3.5" fill="#ffffff" stroke="#bc7155" stroke-width="1.5"/>
        <line x1="-14" y1="-2" x2="-14" y2="-5" stroke="#bc7155" stroke-width="1.5"/>
        <line x1="14" y1="-2" x2="14" y2="-5" stroke="#bc7155" stroke-width="1.5"/>
        <text x="0" y="-2" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="800" fill="#bc7155">$</text>
    </g>

    <!-- Shopping bag (bottom left) -->
    <g transform="translate(45, 152)">
        <path d="M-14 -4 L-12 16 L12 16 L14 -4 Z" fill="none" stroke="#bc7155" stroke-width="1.8" stroke-linejoin="round"/>
        <path d="M-7 -4 Q-7 -14 0 -14 Q7 -14 7 -4" fill="none" stroke="#bc7155" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="-5" y1="6" x2="5" y2="6" stroke="#bc7155" stroke-width="1" opacity="0.5"/>
    </g>

    <!-- Dashed connector dots (price chatter) -->
    <circle cx="78" cy="80" r="1.5" fill="#bc7155" opacity="0.6"/>
    <circle cx="86" cy="76" r="1.5" fill="#bc7155" opacity="0.6"/>
    <circle cx="138" cy="128" r="1.5" fill="#bc7155" opacity="0.6"/>
    <circle cx="146" cy="124" r="1.5" fill="#bc7155" opacity="0.6"/>
</svg>
